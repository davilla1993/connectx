{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Connexion — ConnectX{% endblock %}

{% block content %}
<div class="cx-auth-wrapper">
    <div class="cx-auth-card w-100">
        <div class="cx-card p-4 p-md-5">
            <div class="text-center mb-5">
                <h1 class="fw-800 display-5 mb-0 text-indigo" style="letter-spacing: -1px;">Connect<span class="text-rose">X</span></h1>
                <p class="text-muted mt-2">Heureux de vous revoir !</p>
            </div>
            
            <form method="post" class="needs-validation">
                {% csrf_token %}
                <div class="mb-4">
                    {{ form|crispy }}
                    <div class="text-end mt-1">
                        <a href="{% url 'accounts:password_reset' %}" class="small text-decoration-none text-muted">Mot de passe oublié ?</a>
                    </div>
                </div>
                <button class="btn btn-accent btn-lg w-100 py-3 shadow-sm d-flex align-items-center justify-content-center gap-2">
                    <i class="bi bi-box-arrow-in-right"></i> Se connecter
                </button>
            </form>
            
            <div class="text-center mt-5 pt-4 border-top opacity-75">
                <p class="mb-0 text-muted small">
                    Pas encore de compte ?
                    <a href="{% url 'accounts:register' %}" class="fw-800 text-decoration-none ms-1" style="color: var(--cx-accent);">Rejoignez-nous</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Modifier le profil — ConnectX{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="cx-card p-4">
            <h5 class="fw-bold mb-4"><i class="bi bi-gear me-2"></i>Modifier le profil</h5>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mt-4 pt-3 border-top">
                    <div class="d-flex gap-2">
                        <button class="btn text-white" style="background: var(--cx-primary);">Enregistrer les modifications</button>
                        <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Annuler</a>
                    </div>
                    <a href="{% url 'accounts:password_change' %}" class="btn btn-link text-muted text-decoration-none small">
                        <i class="bi bi-shield-lock"></i> Changer de mot de passe
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Changer le mot de passe — ConnectX{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-11">
        <div class="cx-card p-4">
            <h5 class="fw-bold mb-4"><i class="bi bi-shield-lock me-2"></i>Changer le mot de passe</h5>
            <form method="post">
                {% csrf_token %}
                {{ form|crispy }}
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn text-white" style="background: var(--cx-primary);">Mettre à jour le mot de passe</button>
                    <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

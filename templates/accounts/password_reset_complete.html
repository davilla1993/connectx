{% extends 'base.html' %}
{% block title %}Mot de passe changé — ConnectX{% endblock %}

{% block content %}
<div class="cx-auth-wrapper">
    <div class="cx-card cx-auth-card p-5 text-center">
        <div class="mb-4">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
        </div>
        <h3 class="fw-800 mb-3">Succès !</h3>
        <p class="text-muted mb-4">Votre mot de passe a été modifié avec succès. Vous pouvez maintenant vous connecter.</p>
        <a href="{% url 'accounts:login' %}" class="btn btn-premium w-100 py-2">Se connecter</a>
    </div>
</div>
{% endblock %}
